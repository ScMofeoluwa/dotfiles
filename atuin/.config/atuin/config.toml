# Atuin config - compact style mimicking zsh-autocomplete

# Search
search_mode = "fuzzy"
filter_mode = "directory"
filter_mode_shell_up_key_binding = "directory"

# UI - compact inline style
style = "compact"
inline_height = 16
invert = false
show_preview = true
max_preview_height = 3
show_help = false
show_tabs = false
enter_accept = true
keymap_mode = "auto"

[ui]
columns = ["command"]

[keys]
scroll_exits = true

[sync]
records = true
